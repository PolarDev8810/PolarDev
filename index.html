    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* --- PANTALLA DE CARGA (PRELOADER) --- */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #020205;
            z-index: 999999; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loader-content {
            text-align: center;
            width: 80%;
            max-width: 300px;
        }

        .loader-title {
            font-family: 'Courier Prime', monospace;
            font-size: 1.1rem;
            color: #c084fc;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(192, 132, 252, 0.5);
        }

        .loader-percentage {
            font-family: 'Courier Prime', monospace;
            font-size: 3rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 15px;
        }

        .loader-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .loader-bar-fill {
            width: 0%; 
            height: 100%;
            background: linear-gradient(90deg, #ff0055, #00ff66, #00ffff);
            background-size: 200% 100%;
            border-radius: 10px;
            transition: width 0.1s linear;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: #000000; 
            font-family: 'Funnel Display', 'Nunito', sans-serif;
            color: white;
            position: relative;
            padding: 20px;
        }

        /* --- CONTORNO RGB EN EL BORDE DE LA PANTALLA --- */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 4px solid transparent;
            border-image: linear-gradient(45deg, #ff0055, #00ff66, #00ffff, #ff00ff, #ff0055) 1;
            z-index: 100000;
            pointer-events: none;
            background-size: 400% 400%;
            animation: rgb-screen-border 6s linear infinite;
        }

        @keyframes rgb-screen-border {
            0% { border-image-source: linear-gradient(45deg, #ff0055, #00ff66, #00ffff, #ff00ff, #ff0055); }
            25% { border-image-source: linear-gradient(135deg, #ff0055, #00ff66, #00ffff, #ff00ff, #ff0055); }
            50% { border-image-source: linear-gradient(225deg, #ff0055, #00ff66, #00ffff, #ff00ff, #ff0055); }
            75% { border-image-source: linear-gradient(315deg, #ff0055, #00ff66, #00ffff, #ff00ff, #ff0055); }
            100% { border-image-source: linear-gradient(45deg, #ff0055, #00ff66, #00ffff, #ff00ff, #ff0055); }
        }

        /* Fondo de estrellas */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: transparent;
        }
        
        .stars::after {
            content: " ";
            position: absolute;
            top: 0;
            left: 0;
            width: 1px;
            height: 1px;
            background: transparent;
            box-shadow: 10vw 20vh #fff, 35vw 45vh #fff, 70vw 15vh rgba(255,255,255,0.7), 85vw 80vh #fff, 20vw 90vh rgba(255,255,255,0.5), 55vw 60vh #fff, 90vw 30vh #fff, 40vw 10vh rgba(255,255,255,0.8), 15vw 50vh #fff, 65vw 75vh #fff;
            animation: moveStarsOptimized 12s linear infinite;
        }

        .stars::before {
            content: " ";
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            background: transparent;
            box-shadow: 25vw 30vh #fff, 60vw 55vh #fff, 80vw 20vh #fff, 45vw 85vh rgba(255,255,255,0.9), 10vw 70vh #fff, 95vw 65vh #fff, 50vw 25vh #fff, 75vw 90vh #fff;
            animation: moveStarsOptimized 18s linear infinite;
        }

        @keyframes moveStarsOptimized {
            from { transform: translate3d(0, 0, 0); }
            to { transform: translate3d(0, -100vh, 0); }
        }

        .wrapper {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
            padding-top: 90px;
        }

        /* Perfil */
        .profile-container {
            text-align: center;
            width: 100%;
            margin-bottom: 25px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-avatar {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 2px solid #c084fc;
            box-shadow: 0 0 15px rgba(192, 132, 252, 0.6);
            background-color: #1a1528;
        }

        .username {
            font-family: 'Courier Prime', monospace;
            font-size: 1.8rem;
            font-weight: 700;
            color: #f3e8ff; 
            margin-bottom: 4px; 
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(180,120,255,0.4); 
        }

        .game-id {
            font-family: 'Courier Prime', monospace;
            font-size: 0.95rem;
            color: #c084fc; 
            margin-bottom: 14px;
            letter-spacing: 0.5px;
            opacity: 0.9;
        }

        .mini-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 1.4rem;
            color: #e9d5ff; 
        }

        /* --- TARJETA DE RECOMPENSA GLASSMORPHISM --- */
        .loot-box {
            width: 100%;
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: center;
            box-shadow: 0 0 25px rgba(180,120,255,0.2); 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .loot-title {
            font-family: 'Courier Prime', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: #e9d5ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .countdown {
            font-size: 2.2rem;
            font-weight: 700;
            color: #ff5252; 
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 10px rgba(255,82,82,0.4);
        }

        /* Selector de pestañas para múltiples códigos */
        .tabs-container {
            display: none; 
            justify-content: center;
            gap: 8px;
            width: 100%;
            margin-bottom: 5px;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #e9d5ff;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Courier Prime', monospace;
            font-size: 0.8rem;
            font-weight: 700;
            transition: all 0.2s ease;
            flex: 1; 
            text-align: center;
        }

        .tab-btn.active {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        /* --- MARCO RGB EXCLUSIVO PARA EL CÓDIGO --- */
        .code-display {
            display: none; 
            font-family: 'Courier Prime', monospace;
            font-size: 1.3rem; 
            font-weight: 700;
            background-color: #050814;
            color: #25D366; 
            padding: 12px 10px; 
            letter-spacing: 1px;
            width: 90%;
            text-align: center;
            text-transform: uppercase;
            cursor: pointer;
            word-break: break-all;
            overflow-wrap: anywhere;
            border: 3px solid transparent;
            border-image: linear-gradient(45deg, #ff0055, #00ff66, #00ffff, #ff00ff, #ff0055) 1;
            background-size: 400% 400%;
            animation: rgb-border-exclusivo 6s linear infinite;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.2), inset 0 0 10px rgba(255, 255, 255, 0.05);
        }

        @keyframes rgb-border-exclusivo {
            0% { border-image-source: linear-gradient(45deg, #ff0055, #00ff66, #00ffff, #ff00ff, #ff0055); }
            25% { border-image-source: linear-gradient(135deg, #ff0055, #00ff66, #00ffff, #ff00ff, #ff0055); }
            50% { border-image-source: linear-gradient(225deg, #ff0055, #00ff66, #00ffff, #ff00ff, #ff0055); }
            75% { border-image-source: linear-gradient(315deg, #ff0055, #00ffff, #ff00ff, #ff0055); }
            100% { border-image-source: linear-gradient(45deg, #ff0055, #00ff66, #00ffff, #ff00ff, #ff0055); }
        }

        /* Enlaces */
        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 25px; 
        }

        .link-card {
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            box-shadow: 0 0 15px rgba(180,120,255,0.1); 
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            position: relative;
        }

        .link-card:hover {
            transform: scale(1.03);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 25px rgba(180,120,255,0.4); 
        }

        .link-card i {
            font-size: 1.8rem;
            width: 40px;
            text-align: center;
            color: #c084fc; 
        }

        .link-text {
            flex-grow: 1;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-right: 40px; 
        }

        .link-card-custom {
            padding: 14px 20px;
            cursor: pointer;
        }

        .whatsapp-icon {
            color: #25D366 !important; 
        }

        .custom-text-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding-left: 15px;
            text-align: left;
        }

        .custom-title {
            font-size: 1.2rem;
            font-weight: 500;
            font-family: 'Courier Prime', monospace;
        }

        .custom-subtitle {
            font-size: 0.85rem;
            color: #e9d5ff;
            margin-top: 2px;
            opacity: 0.8;
        }

        /* --- CUADRO RECOMENDADO / VIDEO DESTACADO --- */
        .video-promo-box {
            width: 100%;
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .video-promo-label {
            font-family: 'Courier Prime', monospace;
            font-size: 0.85rem;
            font-weight: 700;
            color: #c084fc;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .video-responsive {
            overflow: hidden;
            padding-bottom: 56.25%; 
            position: relative;
            height: 0;
            width: 100%;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-responsive iframe {
            left: 0;
            top: 0;
            height: 100%;
            width: 100%;
            position: absolute;
        }

        /* --- PANEL DE HERRAMIENTAS --- */
        .toolbox-container {
            width: 100%;
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            padding: 0; 
            text-align: center;
            box-shadow: 0 0 25px rgba(250, 204, 21, 0.15); 
            display: flex;
            flex-direction: column;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .toolbox-heading {
            width: 100%;
            padding: 20px;
            font-family: 'Courier Prime', monospace;
            font-size: 1.3rem;
            font-weight: 700;
            color: #facc15; 
            letter-spacing: 1.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-shadow: 0 0 10px rgba(250, 204, 21, 0.4);
            cursor: pointer;

        }

        .toolbox-heading:hover {

        }

        .toolbox-heading i.fa-chevron-down {
            font-size: 1rem;
            transition: transform 0.3s ease;
        }

        .toolbox-heading.activo i.fa-chevron-down {
            transform: rotate(180deg);
        }

        .toolbox-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out, padding 0.4s ease-out;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 0 20px;

        .toolbox-content.abierto {

            padding: 0 20px 20px 20px; 
        }

        .tool-card {
            background: rgba(15, 10, 31, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;

        .tool-title {
            font-size: 1rem;
            font-weight: 700;
            color: #ffffff; 
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tool-input {
            width: 100%;
            background: #050814;
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 8px;
            padding: 12px;
            color: #ffffff;
            font-family: 'Courier Prime', monospace;
            font-size: 0.9rem;
            outline: none;
            transition: border 0.3s ease;
        }

        .tool-input:focus {
            border-color: #ffffff;
        }

        .tool-btn {
            width: 100%;
            font-family: 'Courier Prime', monospace;
            font-size: 1rem;
            font-weight: 700;
            color: #ffffff !important; 
            background: #16161a; 
            padding: 12px 0;
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.1s ease, background 0.2s ease;
        }

        .tool-btn:hover:not(:disabled) {
            background: #222227; 
        }

        .tool-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: #444;
            color: #777 !important;
        }

        /* --- CONTENEDOR DE PREVIEW DE MINIATURA --- */
        .thumb-preview-box {
            display: none; 
            width: 100%;
            margin-top: 10px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .thumb-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Adsterra */
        .adsterra-box {
            width: 100%;
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);

            padding: 15px 10px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px; 
        }

        .adsterra-label {
            font-family: 'Courier Prime', monospace;
            font-size: 0.8rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
        }

        /* --- ALERTA PERSONALIZADA ESTILIZADA (TOAST) --- */
        .custom-toast {
            position: fixed;
            bottom: -100px; 
            left: 50%;
            transform: translateX(-50%);
            background: rgba(5, 8, 20, 0.95);
            border: 2px solid #25D366; 
            color: #ffffff;
            padding: 14px 24px;
            border-radius: 10px;
            font-family: 'Courier Prime', monospace;
            font-size: 0.95rem;
            font-weight: 700;
            text-align: center;
            z-index: 200000;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.4);
            backdrop-filter: blur(10px);
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 85%;
            max-width: 340px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .custom-toast.show {
            bottom: 40px; 
        }
    </style>
</head>

                    <button class="tool-btn" id="downloadBtn" onclick="processDownload()">Descargar MP4</button>
                </div>

                <div class="tool-card">
                    <div class="tool-title">
                        Extraer Miniatura YouTube (HD)
                    </div>
                    <input type="text" class="tool-input" id="ytLink" placeholder="Pega el link del video de YouTube...">
                    <button class="tool-btn" onclick="extractThumbnail()">Obtener Miniatura</button>
                    
                    <div class="thumb-preview-box" id="thumbBox">
                        <img src="" class="thumb-img" id="thumbImg" alt="Miniatura">
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const ADSTERRA_DIRECT_LINK = "https://www.effectivecpmnetwork.com/keyyndqw?key=68392251e25e85d38c413b9bed61667d";
        const WHATSAPP_CHANNEL_URL = "https://whatsapp.com/channel/0029VbCLmjG77qVT5oUJQY3e";

        let progresoActual = 0;
        let paginaTotalmenteCargada = false;
        const txtPorcentaje = document.getElementById('loadPercent');
        const barraRelleno = document.getElementById('loadBar');
        const contenedorLoader = document.getElementById('preloader');

        const intervaloCarga = setInterval(() => {
            if (!paginaTotalmenteCargada) {
                if (progresoActual < 85) {
                    progresoActual += Math.floor(Math.random() * 5) + 2;
                    if (progresoActual > 85) progresoActual = 85;
                    actualizarInterfazLoader(progresoActual);
                }
            } else {
                progresoActual += Math.floor(Math.random() * 12) + 5;
                if (progresoActual >= 100) {
                    progresoActual = 100;
                    actualizarInterfazLoader(progresoActual);
                    clearInterval(intervaloCarga);
                    
                    setTimeout(() => {
                        contenedorLoader.style.opacity = '0';
                        contenedorLoader.style.visibility = 'hidden';
                    }, 400);
                } else {
                    actualizarInterfazLoader(progresoActual);
                }
            }
        }, 40);

        function actualizarInterfazLoader(valor) {
            txtPorcentaje.textContent = `${valor}%`;
            barraRelleno.style.width = `${valor}%`;
        }

        window.addEventListener('load', () => {
            paginaTotalmenteCargada = true;
        });

        function toggleHerramientas() {
            const header = document.getElementById("toolboxHeader");
            const content = document.getElementById("toolboxContent");
            header.classList.toggle("activo");
            content.classList.toggle("abierto");
        }

        const TOKENS_OCULTOS = [
            "REpIM2tQM00wV1ZKSzFXQ1Q0", 
            "REpIM2tQM00wQlAwMUpNMjFL", 
            "REpIM2tQM00wUldHUlZCWDBW"
        ];
        let codigosDecodificados = [];
        let codigoActivoActual = "";

       
        const FECHA_LANZAMIENTO = new Date("May 30, 2026 09:30:00").getTime(); 

        const elementoTimer = document.getElementById('timer');
        const elementoCodigo = document.getElementById('codeBox');
        const elementoTitulo = document.getElementById('lootTitle');
        const elementoTabs = document.getElementById('tabsBox');
        const elementoToast = document.getElementById('toastAlert');

        const cuentaAtras = setInterval(() => {
            const ahora = Date.now();
            const distanciaReal = FECHA_LANZAMIENTO - ahora;

            if (distanciaReal < 0) {
                clearInterval(cuentaAtras);
                elementoTimer.style.display = 'none';
                elementoTitulo.innerHTML = '<i class="fa-solid fa-fire" style="color:#25D366;"></i> (Toca para copiar)';
                
                TOKENS_OCULTOS.forEach(token => {
                    try {
                        codigosDecodificados.push(decodeURIComponent(escape(atob(token))));
                    } catch(e) {
                        codigosDecodificados.push("ERR_CODE");
                    }
                });

                codigoActivoActual = codigosDecodificados[0];
                elementoCodigo.textContent = codigoActivoActual;
                
                elementoTabs.style.display = 'flex'; 
                elementoCodigo.style.display = 'block';
                return;
            }

            const dias = Math.floor(distanciaReal / 86400000);
            const horas = Math.floor((distanciaReal % 86400000) / 3600000);
            const minutes = Math.floor((distanciaReal % 3600000) / 60000);
            const segundos = Math.floor((distanciaReal % 60000) / 1000);

            const hStr = horas.toString().padStart(2, '0');
            const mStr = minutes.toString().padStart(2, '0'); 
            const sStr = segundos.toString().padStart(2, '0');

            elementoTimer.textContent = dias > 0 ? `${dias}d ${hStr}:${mStr}:${sStr}` : `${hStr}:${mStr}:${sStr}`;
        }, 1000);

        function switchCode(numeroCodigo) {
            if (codigosDecodificados.length === 0) return;
            
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach((btn, index) => {
                if (index === (numeroCodigo - 1)) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            codigoActivoActual = codigosDecodificados[numeroCodigo - 1];
            elementoCodigo.textContent = codigoActivoActual;
        }

        function copyCode() {
            if (!codigoActivoActual) return; 
            navigator.clipboard.writeText(codigoActivoActual).then(() => {
                window.open(ADSTERRA_DIRECT_LINK, "_blank");
                elementoToast.classList.add('show');
                setTimeout(() => {
                    elementoToast.classList.remove('show');
                }, 3500);
            }).catch(() => {
                alert('Código: ' + codigoActivoActual);
            });
        }

        function openWhatsApp() {
            window.open(ADSTERRA_DIRECT_LINK, "_blank");
            window.location.href = WHATSAPP_CHANNEL_URL;
        }

        function processDownload() {
            const urlInput = document.getElementById('videoLink').value.trim();
            const btn = document.getElementById('downloadBtn');
            if (urlInput === "") { alert("Pega el enlace de TikTok."); return; }
            window.open(ADSTERRA_DIRECT_LINK, "_blank");
            btn.disabled = true; btn.textContent = "Procesando...";
            fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(urlInput)}`)
                .then(response => response.json())
                .then(data => {
                    if (data && data.data && data.data.play) {
                        const a = document.createElement('a');
                        a.href = data.data.play;
                        a.download = `video_polar_${Date.now()}.mp4`;
                        document.body.appendChild(a); a.click(); document.body.removeChild(a);
                    } else { alert("No se pudo extraer el video."); }
                })
                .catch(() => alert("Error en el servidor de descargas."))
                .finally(() => { btn.disabled = false; btn.textContent = "Descargar MP4"; });
        }

        let currentThumbUrl = "";
        function extractThumbnail() {
            const ytLink = document.getElementById('ytLink').value.trim();
            if(ytLink === "") { alert("Pega un enlace de YouTube."); return; }
            window.open(ADSTERRA_DIRECT_LINK, "_blank");
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = ytLink.match(regExp);
            if (match && match[2].length == 11) {
                currentThumbUrl = `https://img.youtube.com/vi/${match[2]}/maxresdefault.jpg`;
                document.getElementById('thumbImg').src = currentThumbUrl;
                document.getElementById('thumbBox').style.display = "block";
            } else { alert("Enlace no válido."); }
        }
    </script>
</body>
</html>
